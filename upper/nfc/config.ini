# ============================================================
# NfcAttendanceHost 应用运行时配置文件
# 程序启动时自动读取（如文件不存在则使用默认值）
# ============================================================

[SerialPort]
# 默认波特率: 9600 | 19200 | 38400 | 57600 | 115200
DefaultBaudRate = 115200
# 数据位: 5 | 6 | 7 | 8
DataBits = 8
# 校验位: None | Even | Odd | Mark | Space
Parity = None
# 停止位: One | OneAndHalf | Two
StopBits = One
# 流控: None | RtsCts | XonXoff
FlowControl = None
# 串口自动重连间隔（毫秒，0=不自动重连）
AutoReconnectInterval = 2000

[Database]
# 数据库文件路径（空=程序目录下 attendance.db）
DBPath =
# WAL 模式: true | false
WALMode = true
# 同步模式: OFF | NORMAL | FULL
Synchronous = NORMAL

[Records]
# issue_records.csv 文件路径（空=程序目录下）
IssueRecordsPath =
# 发卡图像保存目录（空=程序目录下 issued_cards/）
IssueImagesDir =

[UI]
# 日志最大行数
MaxLogLines = 1000
# 考勤记录表格每页条数
RecordsPerPage = 50
# 启动时自动刷新串口列表: true | false
AutoRefreshPorts = true

[Heartbeat]
# 心跳超时时间（毫秒）
HeartbeatTimeout = 5000
