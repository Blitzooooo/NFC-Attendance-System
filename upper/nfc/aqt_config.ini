# ============================================================
# aqtinstall 配置文件 — Qt 命令行安装工具
# 用法: python -m aqt install-qt -c aqt_config.ini ...
# ============================================================

[mirrors]
# 国内优先镜像源（按优先级排列）
trusted_mirrors =
    https://mirrors.tuna.tsinghua.edu.cn/qt,
    https://mirrors.ustc.edu.cn/qtproject,
    https://mirror.nju.edu.cn/qt

[requests]
# 哈希校验重试次数（网络不稳定时增大）
max_retries_to_retrieve_hash = 5
# 下载超时（秒）
timeout = 30

[install]
# Qt 安装根目录
outputdir = D:\Qt
# 安装后保留压缩包（调试用，默认删除）
keep_archives = false

# ============================================================
# 本工程所需 Qt 安装命令（仅供参考，需手动执行）:
#   python -m aqt install-qt windows desktop 6.11.1 win64_mingw -O D:\Qt -m qtserialport
#   python -m aqt install-tool windows desktop tools_mingw1310_64 -O D:\Qt
# ============================================================
